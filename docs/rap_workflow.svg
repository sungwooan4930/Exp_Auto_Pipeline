<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFBFA"/>
      <stop offset="1" stop-color="#F3F3F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#44403C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #191919; }
      .subtitle { font: 500 18px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6B7280; }
      .panel-title { font: 700 23px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1F2937; }
      .panel-note { font: 500 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #78716C; }
      .eyebrow { font: 700 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #A16207; letter-spacing: 0.12em; }
      .card-title { font: 700 20px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1C1917; }
      .card-body { font: 500 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6B7280; }
      .edge-label { font: 600 15px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #57534E; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="34" y="30" width="1532" height="920" rx="32" fill="#FFFFFF" stroke="#E7E5E4"/>

  <text x="78" y="92" class="title">RAP Workflow for Claude Code</text>
  <text x="78" y="124" class="subtitle">연구자 승인 루프와 검증 실패 시 역방향 복귀 규칙을 포함한 운영 구조</text>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="500" height="720" rx="30" fill="#FFF9DB" stroke="#F2D45C" stroke-width="2.4"/>
    <rect x="608" y="170" width="922" height="720" rx="30" fill="#F7F7F5" stroke="#E7E5E4" stroke-width="2"/>
  </g>

  <text x="98" y="212" class="eyebrow">LOOP A</text>
  <text x="98" y="244" class="panel-title">연구 서치 루프</text>
  <text x="98" y="270" class="panel-note">연구자가 논문 후보군을 승인할 때까지 반복</text>

  <text x="636" y="212" class="eyebrow">LOOP B</text>
  <text x="636" y="244" class="panel-title">연구 아이디어 구체화 및 검증</text>
  <text x="636" y="270" class="panel-note">gap·가설 승인 이후 실험 설계와 시뮬레이션으로 진행</text>

  <g filter="url(#shadow)">
    <rect x="108" y="326" width="428" height="96" rx="24" fill="#FFFFFF" stroke="#E7C94D" stroke-width="2"/>
    <rect x="108" y="462" width="428" height="112" rx="24" fill="#FFFFFF" stroke="#E7C94D" stroke-width="2"/>
    <rect x="108" y="614" width="428" height="116" rx="24" fill="#FFFFFF" stroke="#E7C94D" stroke-width="2"/>

    <rect x="652" y="326" width="398" height="116" rx="24" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
    <rect x="1090" y="346" width="378" height="76" rx="38" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
    <rect x="652" y="510" width="816" height="126" rx="24" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
    <rect x="652" y="694" width="392" height="112" rx="24" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
    <rect x="1084" y="694" width="384" height="112" rx="24" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  </g>

  <text x="140" y="364" class="card-title">연구자 요구 입력</text>
  <text x="140" y="389" class="card-body">도메인, 키워드, 실험 유형, 제약조건 정리</text>

  <text x="140" y="500" class="card-title">논문 탐색</text>
  <text x="140" y="525" class="card-body">검색 전략 수립, 쿼리 생성, 후보 논문 수집</text>
  <text x="140" y="548" class="card-body">정규화 JSON: search_cycle_output.json</text>

  <text x="140" y="652" class="card-title">연구자 확인 및 피드백</text>
  <text x="140" y="677" class="card-body">피드백 구조화 후 재탐색 반복</text>
  <text x="140" y="700" class="card-body">최종 승인 시 Loop B로 이동</text>

  <text x="684" y="366" class="card-title">Gap 제시 및 가설 제시</text>
  <text x="684" y="392" class="card-body">근거 논문과 연결된 gap, hypothesis 세트 생성</text>
  <text x="684" y="415" class="card-body">정규화 JSON: gap_hypothesis_output.json</text>

  <text x="1279" y="391" class="card-title" text-anchor="middle">연구자 승인 루프</text>

  <text x="684" y="551" class="card-title">피드백 반영 및 최종 승인 반복</text>
  <text x="684" y="577" class="card-body">Gap과 hypothesis를 함께 수정하고 승인될 때까지 반복</text>
  <text x="684" y="600" class="card-body">승인되면 experiment design 단계로 이동</text>

  <text x="684" y="734" class="card-title">실험 디자인 제시</text>
  <text x="684" y="760" class="card-body">변수, 절차, 지표, 검정 계획 구조화</text>
  <text x="684" y="783" class="card-body">정규화 JSON: experiment_design_output.json</text>

  <text x="1116" y="734" class="card-title">시뮬레이션 및 결과 예측</text>
  <text x="1116" y="760" class="card-body">실제 데이터 또는 가상 데이터 기반 검증</text>
  <text x="1116" y="783" class="card-body">정규화 JSON: simulation_output.json</text>

  <line x1="322" y1="422" x2="322" y2="462" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="322" y1="574" x2="322" y2="614" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M536 672C590 672 614 672 630 672C630 672 630 572 630 572C630 572 652 572 652 572" stroke="#44403C" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <line x1="1050" y1="384" x2="1090" y2="384" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1090" y1="408" x2="1050" y2="408" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="860" y1="442" x2="860" y2="510" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1279" y1="422" x2="1279" y2="510" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1060 573C1094 573 1110 573 1110 573C1110 573 1110 573 1110 573C1110 573 1020 573 1020 573" stroke="transparent"/>
  <path d="M1060 573C1125 573 1130 573 1130 573C1130 573 1130 750 1130 750C1130 750 1084 750 1084 750" stroke="#44403C" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <line x1="1044" y1="750" x2="1084" y2="750" stroke="#44403C" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1276 806C1276 846 1276 858 1276 858C1276 858 948 858 948 858C948 858 948 806 948 806" stroke="#F2C94C" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1162 806C1162 874 1162 904 1162 904C1162 904 860 904 860 904C860 904 860 636 860 636" stroke="#D97706" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="1168" y="842" class="edge-label">검증 실패 시 2단계로 복귀</text>
  <text x="980" y="898" class="edge-label">필요 시 1단계로 복귀</text>
  <text x="582" y="658" class="edge-label">승인 후 이동</text>
  <text x="1140" y="336" class="edge-label">피드백</text>

  <rect x="1280" y="110" width="250" height="34" rx="17" fill="#FFF4BF" stroke="#F2D45C"/>
  <text x="1405" y="132" class="card-body" text-anchor="middle">모든 단계는 정규화 JSON 입출력 사용</text>
</svg>
